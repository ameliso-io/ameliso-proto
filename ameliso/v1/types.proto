syntax = "proto3";

package ameliso.v1;

option go_package = "github.com/tupe12334/ameliso/generated;ameliso";

message Case {
  string path = 1;
  string title = 2;
  string description = 3;
  repeated string tags = 4;
  string priority = 5;
  string created_at = 6;
  string updated_at = 7;
  // Markdown body — the actual test procedure/steps. Populated when the caller
  // needs full case content (e.g. ListCases, GetCase, GetPendingCases).
  string body = 8;
  // IDs of testing strategies linked to this case.
  repeated string strategy_ids = 9;
}

message TestingStrategy {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  string created_at = 5;
  string updated_at = 6;
  string deleted_at = 7;
}

message RepoPermission {
  string name = 1;
  string role = 2;
}

message RepoToken {
  string token = 1;
  string name = 2;
  string role = 3;
  string created_at = 4;
}

message Suite {
  string slug = 1;
  string name = 2;
  string description = 3;
  repeated string cases = 4;
}

message RunMeta {
  string id = 1;
  string date = 2;
  repeated string testers = 3;
  RunStatus status = 4;
  string environment = 5;
  string suite = 6;
  // Optional git commit SHA recorded at run creation time.
  // Agents can use this as `since_ref` in GetAffectedCases to find
  // tests affected since this run's baseline commit.
  string commit_sha = 7;
  // Result counts — populated by ListRuns and FinalizeRun so agents can
  // read pass/fail outcomes without a separate GetRun call.
  int32 passed = 8;
  int32 failed = 9;
  int32 blocked = 10;
  int32 skipped = 11;
  int32 total = 12;
  string description = 13;
}

message CaseResult {
  string case_path = 1;
  ResultStatus status = 2;
  string notes = 3;
  // Snapshot of case body (markdown) at time of result recording.
  string body_snapshot = 4;
  // Execution time in milliseconds. 0 means not recorded.
  int64 duration_ms = 5;
  // Free-form failure category (e.g. "assertion", "timeout", "crash"). Empty when not set.
  string error_type = 6;
}

message Run {
  RunMeta meta = 1;
  repeated CaseResult results = 2;
}

message CoverageEntry {
  Case case = 1;
  ResultStatus latest_status = 2;
  string last_run_id = 3;
  string last_run_date = 4;
  // Deprecated: use case.body instead (Case.body is now always populated).
  string body = 5;
  // 0.0 = never flaky, 1.0 = status changes every run. Only set when ≥2 results exist.
  float flakiness_score = 6;
}

message AffectedCase {
  Case case = 1;
  string reason = 2;
  // Latest test result status for this case — lets agents prioritize
  // never-run or failed cases over recently-passed ones.
  ResultStatus latest_status = 3;
  // Deprecated: use case.body instead (Case.body is now always populated).
  string body = 4;
}

enum RunStatus {
  RUN_STATUS_UNSPECIFIED = 0;
  RUN_STATUS_IN_PROGRESS = 1;
  RUN_STATUS_COMPLETED = 2;
  RUN_STATUS_ABORTED = 3;
}

enum ResultStatus {
  RESULT_STATUS_UNSPECIFIED = 0;
  RESULT_STATUS_PASSED = 1;
  RESULT_STATUS_FAILED = 2;
  RESULT_STATUS_BLOCKED = 3;
  RESULT_STATUS_SKIPPED = 4;
  RESULT_STATUS_NEVER = 5;
}

enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  PRIORITY_LOW = 1;
  PRIORITY_MEDIUM = 2;
  PRIORITY_HIGH = 3;
}

message AuditEntry {
  int64 id = 1;
  string action = 2;        // "delete"
  string resource_type = 3; // "case", "run", "suite"
  string resource_id = 4;   // case_path, run_id, or slug
  string created_at = 5;    // ISO-8601 timestamp
}

// A GitHub repository connected via the GitHub App installation.
message Repository {
  string id = 1;              // "owner/repo"
  string name = 2;            // "repo"
  string full_name = 3;       // "owner/repo"
  string html_url = 4;        // "https://github.com/owner/repo"
  reserved 5, 7;
  reserved "local_path", "cloned";
  string installation_id = 6;
  string added_at = 8;
  string api_key = 9;
}
